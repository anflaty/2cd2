<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر ضبي للغتر الفاخرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark: #121212;
            --cream: #f9f7f2;
            --white: #ffffff;
        }

        body {
            background-color: var(--cream);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--dark);
        }

        /* الهيدر المتجاوب */
        header {
            background: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .brand { text-align: center; }
        .logo-ar { font-family: 'Amiri', serif; font-size: 28px; color: var(--gold); margin: 0; }
        .logo-en { font-size: 10px; letter-spacing: 3px; color: #888; display: block; }

        .nav-actions { display: flex; gap: 20px; font-size: 14px; font-weight: 600; cursor: pointer; }

        /* البانر الرئيسي */
        .hero {
            background: #222; /* يمكنك إضافة صورة خلفية هنا */
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 0 20px;
        }

        .hero h2 { font-size: 2.5rem; margin-bottom: 20px; }
        .shop-btn {
            background: var(--gold);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .shop-btn:hover { opacity: 0.9; }

        /* التصنيفات الدائرية */
        .categories {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 40px 20px;
            flex-wrap: wrap; /* لتنزيل العناصر في الجوال */
        }

        .cat-item { text-align: center; width: 80px; }
        .circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 1px solid #ddd;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: bold;
            color: var(--gold);
        }

        /* شبكة المنتجات (السر هنا في التجاوب) */
        .products-grid {
            display: grid;
            padding: 20px 5%;
            gap: 20px;
            /* للكمبيوتر: 4 منتجات في الصف */
            grid-template-columns: repeat(4, 1fr);
        }

        .product-card {
            background: var(--white);
            padding: 15px;
            text-align: center;
            position: relative;
            border-radius: 5px;
            transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .product-card img {
            width: 100%;
            height: auto;
            background: #f4f4f4;
            margin-bottom: 15px;
        }

        .product-card h3 { font-size: 14px; font-weight: 400; height: 40px; }
        .price { color: var(--gold); font-weight: bold; display: block; margin: 10px 0; }
        
        .add-cart {
            width: 100%;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            padding: 8px;
            cursor: pointer;
        }

        /* استعلامات الوسائط (Media Queries) للهواتف */
        @media (max-width: 768px) {
            .hero { height: 300px; }
            .hero h2 { font-size: 1.5rem; }
            
            /* للجوال: منتجين في الصف كما في الصورة */
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                padding: 10px;
            }

            .categories { gap: 15px; }
            .circle { width: 60px; height: 60px; font-size: 12px; }
        }

        footer {
            background: white;
            padding: 40px;
            text-align: center;
            margin-top: 50px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-actions">
            <span>بحث</span>
            <span>السلة (0)</span>
        </div>
        <div class="brand">
            <h1 class="logo-ar">ضبي</h1>
            <span class="logo-en">DHABI</span>
        </div>
        <div class="menu">القائمة</div>
    </header>

    <section class="hero">
        <div>
            <h2>أناقة الغترة الخليجية</h2>
            <button class="shop-btn">اكتشف المجموعة</button>
        </div>
    </section>

    <section class="categories">
        <div class="cat-item"><div class="circle">جديد</div><span>جديدنا</span></div>
        <div class="cat-item"><div class="circle">نخبة</div><span>الأكثر مبيعاً</span></div>
        <div class="cat-item"><div class="circle">أبيض</div><span>غتر بيضاء</span></div>
        <div class="cat-item"><div class="circle">شتاء</div><span>مجموعات شتوية</span></div>
    </section>

    <section class="products-grid">
        <div class="product-card">
            <img src="img1.jpg" alt="منتج 1"> <h3>غترة ضبي السويسرية</h3>
            <span class="price">450 ر.س</span>
            <button class="add-cart">أضف للسلة</button>
        </div>
        <div class="product-card">
            <img src="img2.jpg" alt="منتج 2">
            <h3>شماغ ضبي كلاسيك</h3>
            <span class="price">380 ر.س</span>
            <button class="add-cart">أضف للسلة</button>
        </div>
        <div class="product-card">
            <img src="img3.jpg" alt="منتج 3">
            <h3>غترة قطن رويال</h3>
            <span class="price">520 ر.س</span>
            <button class="add-cart">أضف للسلة</button>
        </div>
        <div class="product-card">
            <img src="img4.jpg" alt="منتج 4">
            <h3>شماغ أحمر ملكي</h3>
            <span class="price">490 ر.س</span>
            <button class="add-cart">أضف للسلة</button>
        </div>
    </section>

    <footer>
        <p>من نحن | الشحن | الخصوصية</p>
        <p>© 2026 متجر ضبي. جميع الحقوق محفوظة.</p>
    </footer>

</body>
</html>
